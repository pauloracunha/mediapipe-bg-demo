<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figurinha Copa 2026 — MediaPipe</title>
  <style>
    :root { --country: #009c3b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d16;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      gap: 22px;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    h1 em { color: var(--country); font-style: normal; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 14px 20px;
      width: 100%;
      max-width: 520px;
    }
    label {
      font-size: 0.78rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type="text"] {
      background: #22222e;
      color: #fff;
      border: 1px solid #3a3a4c;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    input[type="range"] {
      width: 80px;
      accent-color: var(--country);
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, filter 0.15s;
    }
    button:hover { filter: brightness(1.15); }
    button:disabled { opacity: 0.35; cursor: not-allowed; filter: none; }
    .btn-start { background: var(--country); color: #fff; }
    .btn-stop  { background: #2a2a3a; color: #ccc; }
    .btn-dl    { background: #FFD700; color: #000; }

    .sticker-wrap {
      position: relative;
      filter:
        drop-shadow(0 0 28px color-mix(in srgb, var(--country) 55%, transparent))
        drop-shadow(0 16px 40px rgba(0,0,0,0.8));
    }

    canvas#output {
      display: block;
      width: 300px;
      height: 420px;
      border-radius: 13px;
    }

    .fps {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 0.68rem;
      font-family: monospace;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      pointer-events: none;
    }

    #status { font-size: 0.76rem; min-height: 1.1em; }
    #status.ok      { color: #4caf50; }
    #status.err     { color: #f44336; }
    #status.loading { color: #888; }
  </style>
</head>
<body>

<h1>Figurinha <em>Copa do Mundo 2026™</em></h1>

<div class="controls">
  <label>
    Nome
    <input type="text" id="playerName" value="SEU NOME" maxlength="18" style="width:130px">
  </label>
  <label>
    País
    <input type="text" id="countryCode" value="BRA" maxlength="3"
           style="width:48px;text-transform:uppercase;text-align:center">
  </label>
  <label>
    Máscara
    <input type="range" id="threshold" min="1" max="92" value="42">
  </label>
  <button class="btn-start" id="btnStart" disabled>▶ Câmera</button>
  <button class="btn-stop"  id="btnStop"  disabled>■ Parar</button>
  <button class="btn-dl"    id="btnDl">⬇ Salvar</button>
</div>

<div class="sticker-wrap">
  <canvas id="output" width="480" height="672"></canvas>
  <div class="fps" id="fpsBadge">-- fps</div>
</div>

<div id="status" class="loading">Carregando modelo MediaPipe…</div>

<video id="video" autoplay muted playsinline style="display:none"></video>

<script type="module">
import {
  ImageSegmenter,
  FilesetResolver,
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs';

// ── Card dimensions (portrait sticker 5:7) ───────────────────
const CW = 480, CH = 672;

// ── DOM refs ─────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('output');
const ctx       = canvas.getContext('2d');
const status    = document.getElementById('status');
const btnStart  = document.getElementById('btnStart');
const btnStop   = document.getElementById('btnStop');
const btnDl     = document.getElementById('btnDl');
const fpsBadge  = document.getElementById('fpsBadge');
const nameInput = document.getElementById('playerName');
const ccInput   = document.getElementById('countryCode');
const thrInput  = document.getElementById('threshold');

// ── State ────────────────────────────────────────────────────
let segmenter = null, stream = null, running = false;
let lastTs = 0, fpsArr = [];

// ── Country palettes [dark, mid, light/accent] ───────────────
const PALETTES = {
  BRA: ['#003b1a', '#0a6e31', '#FFDF00'],
  ARG: ['#2a6fa8', '#74ACDF', '#e8f4fd'],
  POR: ['#003d00', '#006600', '#cc0000'],
  ESP: ['#7a0010', '#c60b1e', '#f1bf00'],
  FRA: ['#001f6b', '#002395', '#ED2939'],
  ALE: ['#111',    '#333',    '#D00000'],
  ING: ['#00154c', '#CF0823', '#fff'   ],
  URU: ['#002b5c', '#003580', '#5EB6E4'],
  MEX: ['#003a1c', '#006847', '#CE1126'],
  USA: ['#001c4d', '#002868', '#BF0A30'],
};
const DEFAULT_PAL = ['#00334d', '#0077b6', '#00b4d8'];

function palette(code) { return PALETTES[code] || DEFAULT_PAL; }

function syncCSSVar() {
  const col = palette((ccInput.value || 'BRA').toUpperCase().slice(0, 3))[1];
  document.documentElement.style.setProperty('--country', col);
}

// ── Offscreen canvases ───────────────────────────────────────
const vCanvas = document.createElement('canvas');
const vCtx    = vCanvas.getContext('2d', { willReadFrequently: true });
const pCanvas = document.createElement('canvas');
pCanvas.width = CW; pCanvas.height = CH;
const pCtx = pCanvas.getContext('2d');

// ── Load model ───────────────────────────────────────────────
async function loadModel() {
  status.className   = 'loading';
  status.textContent = 'Inicializando runtime…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
  );
  status.textContent = 'Baixando modelo…';
  segmenter = await ImageSegmenter.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    outputCategoryMask: false,
    outputConfidenceMasks: true,
  });
  status.className   = 'ok';
  status.textContent = 'Modelo pronto. Clique em Câmera.';
  btnStart.disabled  = false;
}

// ── Camera ───────────────────────────────────────────────────
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  vCanvas.width  = video.videoWidth;
  vCanvas.height = video.videoHeight;
  running = true;
  btnStart.disabled = true;
  btnStop.disabled  = false;
  status.className  = 'ok';
  status.textContent = 'Segmentação ativa.';
  requestAnimationFrame(loop);
}

function stopCamera() {
  running = false;
  stream?.getTracks().forEach(t => t.stop());
  btnStart.disabled = false;
  btnStop.disabled  = true;
  status.textContent = 'Câmera parada.';
  renderCard(null);
}

// ── Render loop ──────────────────────────────────────────────
function loop(ts) {
  if (!running) return;

  const vW  = video.videoWidth;
  const vH  = video.videoHeight;
  const thr = parseInt(thrInput.value) / 100;

  // Portrait center-crop from landscape video
  const cropW  = Math.round(vH * (CW / CH));
  const cropX  = Math.round((vW - cropW) / 2);
  const scaleX = cropW / CW;
  const scaleY = vH   / CH;

  // Read video pixels (not mirrored — we handle mirror in the loop)
  vCtx.drawImage(video, 0, 0);
  const vFrame = vCtx.getImageData(0, 0, vW, vH).data;

  segmenter.segmentForVideo(video, ts, (result) => {
    const masks = result.confidenceMasks;
    if (!masks?.length) { requestAnimationFrame(loop); return; }

    const maskData = masks[0].getAsFloat32Array();

    // Build portrait RGBA — mirror horiz. for selfie view
    const imgData = new ImageData(CW, CH);
    const d       = imgData.data;

    for (let cy = 0; cy < CH; cy++) {
      for (let cx = 0; cx < CW; cx++) {
        // Mirror x so it feels like a selfie
        const vx = Math.min(vW - 1, Math.round(cropX + (CW - 1 - cx) * scaleX));
        const vy = Math.min(vH - 1, Math.round(cy * scaleY));

        const conf = maskData[vy * vW + vx];
        const pi   = (cy * CW + cx) * 4;

        if (conf > thr) {
          const vi    = (vy * vW + vx) * 4;
          const alpha = Math.min(1, (conf - thr) / 0.12); // soft edge
          d[pi]   = vFrame[vi];
          d[pi+1] = vFrame[vi+1];
          d[pi+2] = vFrame[vi+2];
          d[pi+3] = Math.round(alpha * 255);
        }
      }
    }

    pCtx.putImageData(imgData, 0, 0);
    renderCard(pCanvas);

    if (lastTs > 0) {
      fpsArr.push(ts - lastTs);
      if (fpsArr.length > 20) fpsArr.shift();
      const avg = fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length;
      fpsBadge.textContent = `${(1000 / avg).toFixed(1)} fps`;
    }
    lastTs = ts;

    masks[0].close();
    result.close();
    requestAnimationFrame(loop);
  });
}

// ── Card rendering ───────────────────────────────────────────
const R = 14; // corner radius

function rrPath(x, y, w, h) {
  const p = new Path2D();
  p.roundRect(x, y, w, h, R);
  return p;
}

function renderCard(personSrc) {
  const country = (ccInput.value || 'BRA').toUpperCase().slice(0, 3);
  const name    = (nameInput.value || 'JOGADOR').toUpperCase();
  const pal     = palette(country);

  ctx.clearRect(0, 0, CW, CH);

  // 1 ── Background gradient (country colors) ────────────────
  ctx.save();
  ctx.clip(rrPath(0, 0, CW, CH));
  const bg = ctx.createLinearGradient(0, 0, CW * 0.5, CH);
  bg.addColorStop(0,   pal[0]);
  bg.addColorStop(0.5, pal[1]);
  bg.addColorStop(1,   pal[2]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CW, CH);

  // "26" ghost watermark
  ctx.globalAlpha  = 0.055;
  ctx.fillStyle    = '#fff';
  ctx.font         = `900 ${CH * 0.65}px Impact, 'Arial Black', Arial`;
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('26', CW + 14, CH + 14);
  ctx.globalAlpha  = 1;
  ctx.restore();

  // 2 ── Segmented person (clipped) ──────────────────────────
  if (personSrc) {
    ctx.save();
    ctx.clip(rrPath(0, 0, CW, CH));
    ctx.drawImage(personSrc, 0, 0);
    ctx.restore();
  }

  // 3 ── Left dark scrim (behind logo + name) ────────────────
  ctx.save();
  ctx.clip(rrPath(0, 0, CW, CH));
  const ls = ctx.createLinearGradient(0, 0, 85, 0);
  ls.addColorStop(0, 'rgba(0,0,0,0.80)');
  ls.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ls;
  ctx.fillRect(0, 0, CW, CH);

  // Bottom scrim (behind footer text)
  const bs = ctx.createLinearGradient(0, CH * 0.72, 0, CH);
  bs.addColorStop(0, 'rgba(0,0,0,0)');
  bs.addColorStop(1, 'rgba(0,0,0,0.82)');
  ctx.fillStyle = bs;
  ctx.fillRect(0, 0, CW, CH);
  ctx.restore();

  // 4 ── FIFA 2026 logo block (top-left) ─────────────────────
  drawFifaLogo(10, 10, 58, 72);

  // 5 ── Player name — vertical, left edge ───────────────────
  ctx.save();
  ctx.translate(37, CH - 32);
  ctx.rotate(-Math.PI / 2);
  ctx.font        = `800 23px 'Segoe UI', Arial`;
  ctx.fillStyle   = '#fff';
  ctx.textAlign   = 'left';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.95)';
  ctx.shadowBlur  = 7;
  ctx.fillText(`${name}  (${country})`, 0, 0);
  ctx.restore();

  // 6 ── Footer text ──────────────────────────────────────────
  ctx.save();
  ctx.font        = 'bold 11px "Courier New", monospace';
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = 'rgba(255,255,255,0.5)';
  ctx.textAlign   = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('FIFA WORLD CUP 2026™', CW - 12, CH - 11);
  ctx.fillStyle  = 'rgba(255,255,255,0.28)';
  ctx.textAlign  = 'left';
  ctx.fillText('PANINI', 12, CH - 11);
  ctx.restore();

  // 7 ── White inset border ───────────────────────────────────
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.42)';
  ctx.lineWidth   = 2.5;
  ctx.stroke(rrPath(2.5, 2.5, CW - 5, CH - 5));
  ctx.restore();
}

// ── FIFA 2026 logo (drawn with canvas paths) ─────────────────
function drawFifaLogo(x, y, w, h) {
  ctx.save();

  // Dark rounded background
  ctx.fillStyle = 'rgba(10,10,14,0.90)';
  const bg = new Path2D();
  bg.roundRect(x, y, w, h, 7);
  ctx.fill(bg);

  const mx = x + w / 2;
  const s  = w * 0.24;        // size unit
  const ty = y + h * 0.40;   // trophy center y

  ctx.fillStyle   = '#fff';
  ctx.strokeStyle = '#fff';

  // Trophy cup bowl
  ctx.beginPath();
  ctx.arc(mx, ty, s, Math.PI, 0);
  ctx.lineTo(mx + s * 0.55, ty + s * 0.78);
  ctx.lineTo(mx + s * 0.85, ty + s * 0.78);
  ctx.lineTo(mx + s * 0.85, ty + s * 1.02);
  ctx.lineTo(mx - s * 0.85, ty + s * 1.02);
  ctx.lineTo(mx - s * 0.85, ty + s * 0.78);
  ctx.lineTo(mx - s * 0.55, ty + s * 0.78);
  ctx.closePath();
  ctx.fill();

  // Left handle
  ctx.lineWidth = s * 0.28;
  ctx.beginPath();
  ctx.arc(mx - s, ty - s * 0.22, s * 0.38, Math.PI * 0.5, Math.PI * 1.5);
  ctx.stroke();

  // Right handle
  ctx.beginPath();
  ctx.arc(mx + s, ty - s * 0.22, s * 0.38, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.stroke();

  // Star above trophy
  drawStar(mx, ty - s * 1.55, 5, s * 0.24, s * 0.1);

  // "FIFA" label
  ctx.shadowBlur   = 0;
  ctx.font         = `700 ${Math.round(w * 0.19)}px 'Segoe UI', Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('FIFA', mx, y + h - 5);

  ctx.restore();
}

function drawStar(cx, cy, n, ro, ri) {
  ctx.beginPath();
  for (let i = 0; i < n * 2; i++) {
    const r  = i % 2 === 0 ? ro : ri;
    const an = (i * Math.PI) / n - Math.PI / 2;
    ctx.lineTo(cx + Math.cos(an) * r, cy + Math.sin(an) * r);
  }
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();
}

// ── Events ───────────────────────────────────────────────────
btnStart.addEventListener('click', async () => {
  try {
    status.textContent = 'Acessando câmera…';
    await startCamera();
  } catch (e) {
    status.className   = 'err';
    status.textContent = 'Erro câmera: ' + e.message;
  }
});

btnStop.addEventListener('click', stopCamera);

btnDl.addEventListener('click', () => {
  const a    = document.createElement('a');
  const slug = (nameInput.value || 'jogador').replace(/\s+/g, '-').toLowerCase();
  a.href     = canvas.toDataURL('image/png');
  a.download = `figurinha-copa2026-${slug}.png`;
  a.click();
});

ccInput.addEventListener('input', () => {
  syncCSSVar();
  if (!running) renderCard(null);
});

nameInput.addEventListener('input', () => {
  if (!running) renderCard(null);
});

// ── Init ─────────────────────────────────────────────────────
syncCSSVar();
renderCard(null);

loadModel().catch(e => {
  status.className   = 'err';
  status.textContent = 'Erro ao carregar modelo: ' + e.message;
  console.error(e);
});
</script>
</body>
</html>
