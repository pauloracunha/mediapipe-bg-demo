<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe — Remoção de Fundo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    h1 span { color: #FF245C; }

    .badge {
      font-size: 0.7rem;
      background: #FF245C22;
      color: #FF245C;
      border: 1px solid #FF245C55;
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      max-width: 720px;
    }

    .controls label {
      font-size: 0.8rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button {
      background: #FF245C;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover { background: #e01f52; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: #2a2a35;
      border: 1px solid #3a3a48;
    }
    button.secondary:hover { background: #35353f; }

    select, input[type="color"], input[type="range"] {
      background: #2a2a35;
      color: #e0e0e0;
      border: 1px solid #3a3a48;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    input[type="color"] { padding: 2px 4px; height: 30px; width: 40px; }
    input[type="range"] { padding: 0; width: 90px; }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 720px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #2a2a35;
      background: #111;
    }

    video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      pointer-events: none;
    }

    canvas#output {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
    }

    #status {
      font-size: 0.78rem;
      color: #666;
      min-height: 1.2em;
      text-align: center;
    }
    #status.ok  { color: #4caf50; }
    #status.err { color: #FF245C; }
    #status.loading { color: #888; }

    .fps-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: #0009;
      color: #fff;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h1>MediaPipe <span>>>></span> Remoção de Fundo</h1>
<span class="badge">@mediapipe/tasks-vision · ImageSegmenter</span>

<div class="controls">
  <button id="btnStart">▶ Iniciar Câmera</button>

  <label>
    Fundo:
    <select id="bgMode">
      <option value="color">Cor sólida</option>
      <option value="blur">Desfoque</option>
      <option value="transparent">Xadrez (transparente)</option>
    </select>
  </label>

  <label id="colorPickerWrap">
    <input type="color" id="bgColor" value="#00ff00">
  </label>

  <label id="blurWrap" style="display:none">
    Blur: <input type="range" id="blurLevel" min="4" max="30" value="12">
  </label>

  <label>
    Threshold:
    <input type="range" id="threshold" min="0" max="99" value="50">
  </label>

  <button class="secondary" id="btnStop" disabled>■ Parar</button>
</div>

<div class="canvas-wrapper" id="wrapper">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="output"></canvas>
  <div class="fps-badge" id="fpsBadge">-- fps</div>
</div>

<div id="status" class="loading">Carregando modelo MediaPipe…</div>

<script type="module">
import {
  ImageSegmenter,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs";

const video     = document.getElementById("video");
const canvas    = document.getElementById("output");
const ctx       = canvas.getContext("2d");
const status    = document.getElementById("status");
const btnStart  = document.getElementById("btnStart");
const btnStop   = document.getElementById("btnStop");
const bgMode    = document.getElementById("bgMode");
const bgColor   = document.getElementById("bgColor");
const blurWrap  = document.getElementById("blurWrap");
const colorWrap = document.getElementById("colorPickerWrap");
const blurLevel = document.getElementById("blurLevel");
const threshold = document.getElementById("threshold");
const fpsBadge  = document.getElementById("fpsBadge");

let segmenter = null;
let stream    = null;
let running   = false;
let lastTime  = 0;
let fpsBuffer = [];

// ------------------------------------------------------------------
// offscreen canvas para blur
const offscreen = document.createElement("canvas");
const offCtx    = offscreen.getContext("2d");

// ------------------------------------------------------------------
bgMode.addEventListener("change", () => {
  blurWrap.style.display  = bgMode.value === "blur"  ? "flex" : "none";
  colorWrap.style.display = bgMode.value === "color" ? "flex" : "none";
});

// ------------------------------------------------------------------
async function loadModel() {
  status.className = "loading";
  status.textContent = "Inicializando FilesetResolver…";

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );

  status.textContent = "Baixando modelo selfie segmenter…";

  segmenter = await ImageSegmenter.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    outputCategoryMask: false,
    outputConfidenceMasks: true,
  });

  status.className = "ok";
  status.textContent = "Modelo pronto. Clique em Iniciar Câmera.";
  btnStart.disabled = false;
}

// ------------------------------------------------------------------
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => video.addEventListener("loadedmetadata", r, { once: true }));

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  offscreen.width  = canvas.width;
  offscreen.height = canvas.height;

  btnStart.disabled = true;
  btnStop.disabled  = false;
  running = true;
  requestAnimationFrame(processFrame);
}

function stopCamera() {
  running = false;
  stream?.getTracks().forEach(t => t.stop());
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  btnStart.disabled = false;
  btnStop.disabled  = true;
  status.className  = "";
  status.textContent = "Câmera parada.";
}

// ------------------------------------------------------------------
function processFrame(ts) {
  if (!running) return;

  const thresholdVal = threshold.value / 100;

  segmenter.segmentForVideo(video, ts, (result) => {
    const masks = result.confidenceMasks;
    if (!masks || masks.length === 0) {
      requestAnimationFrame(processFrame);
      return;
    }

    const mask     = masks[0];
    const maskData = mask.getAsFloat32Array();
    const W = canvas.width;
    const H = canvas.height;

    // -- desenha frame original no offscreen
    offCtx.drawImage(video, 0, 0, W, H);
    const frame = offCtx.getImageData(0, 0, W, H);

    // -- output ImageData
    const output = ctx.createImageData(W, H);
    const od     = output.data;
    const fd     = frame.data;

    const mode   = bgMode.value;
    const blurPx = parseInt(blurLevel.value);

    let bgR = 0, bgG = 0, bgB = 0;
    if (mode === "color") {
      const hex = bgColor.value;
      bgR = parseInt(hex.slice(1, 3), 16);
      bgG = parseInt(hex.slice(3, 5), 16);
      bgB = parseInt(hex.slice(5, 7), 16);
    }

    // blur no offscreen se necessário
    let blurredData = null;
    if (mode === "blur") {
      offCtx.filter = `blur(${blurPx}px)`;
      offCtx.drawImage(video, 0, 0, W, H);
      offCtx.filter = "none";
      blurredData = offCtx.getImageData(0, 0, W, H).data;
    }

    for (let i = 0; i < maskData.length; i++) {
      const conf = maskData[i];         // 1 = pessoa, 0 = fundo
      const pi   = i * 4;
      const isFg = conf > thresholdVal;

      if (isFg) {
        od[pi]     = fd[pi];
        od[pi + 1] = fd[pi + 1];
        od[pi + 2] = fd[pi + 2];
        od[pi + 3] = 255;
      } else {
        if (mode === "color") {
          od[pi]     = bgR;
          od[pi + 1] = bgG;
          od[pi + 2] = bgB;
          od[pi + 3] = 255;
        } else if (mode === "blur" && blurredData) {
          od[pi]     = blurredData[pi];
          od[pi + 1] = blurredData[pi + 1];
          od[pi + 2] = blurredData[pi + 2];
          od[pi + 3] = 255;
        } else {
          // transparent / xadrez — alpha 0
          od[pi]     = 0;
          od[pi + 1] = 0;
          od[pi + 2] = 0;
          od[pi + 3] = 0;
        }
      }
    }

    // xadrez de fundo visível no canvas
    if (mode === "transparent") {
      ctx.clearRect(0, 0, W, H);
      drawCheckerboard(W, H);
    }
    ctx.putImageData(output, 0, 0);

    // FPS
    fpsBuffer.push(ts - lastTime);
    if (fpsBuffer.length > 30) fpsBuffer.shift();
    const avgDelta = fpsBuffer.reduce((a, b) => a + b, 0) / fpsBuffer.length;
    fpsBadge.textContent = `${(1000 / avgDelta).toFixed(1)} fps`;
    lastTime = ts;

    mask.close();
    result.close();
  });

  requestAnimationFrame(processFrame);
}

function drawCheckerboard(W, H) {
  const size = 20;
  for (let y = 0; y < H; y += size) {
    for (let x = 0; x < W; x += size) {
      ctx.fillStyle = ((x / size + y / size) % 2 === 0) ? "#ccc" : "#888";
      ctx.fillRect(x, y, size, size);
    }
  }
}

// ------------------------------------------------------------------
btnStart.addEventListener("click", async () => {
  try {
    status.className = "loading";
    status.textContent = "Acessando câmera…";
    await startCamera();
    status.className = "ok";
    status.textContent = "Segmentação em tempo real ativa.";
  } catch (e) {
    status.className = "err";
    status.textContent = "Erro ao acessar câmera: " + e.message;
  }
});

btnStop.addEventListener("click", stopCamera);

// ------------------------------------------------------------------
btnStart.disabled = true;
loadModel().catch(e => {
  status.className = "err";
  status.textContent = "Falha ao carregar modelo: " + e.message;
  console.error(e);
});
</script>
</body>
</html>
