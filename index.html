<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Figurinha Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --country: #009c3b; --pink: #FF245C; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #0d0d16;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ══ VIEW: FORMULÁRIO ════════════════════════════════════ */
    #viewForm {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }

    .form-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .form-logo h1 {
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .form-logo h1 em { color: var(--country); font-style: normal; }
    .form-logo .sub  { font-size: 0.75rem; color: #555; margin-top: 4px; }
    .form-logo .ver  { font-size: 0.55rem; color: #333; font-weight: 400; letter-spacing: 0; }

    .form-card {
      background: #14141e;
      border: 1px solid #22223a;
      border-radius: 20px;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field        { display: flex; flex-direction: column; gap: 5px; }
    .field label  { font-size: 0.7rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input  {
      background: #1c1c2a;
      color: #fff;
      border: 1.5px solid #2c2c44;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input::placeholder { color: #3a3a52; font-weight: 400; }
    .field input:focus        { border-color: var(--pink); }
    .field input.err          { border-color: #f44336; }
    .char-count { font-size: 0.67rem; color: #444; text-align: right; }

    .field-row             { display: flex; gap: 12px; }
    .field-row .field      { flex: 1; min-width: 0; }
    .field.narrow          { flex: 0 0 80px; }
    .field.narrow input    { text-align: center; width: 100%; min-width: 0; }

    .form-divider { height: 1px; background: #22223a; }

    .btn-primary {
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      margin-top: 4px;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-primary:hover  { filter: brightness(1.12); }
    .btn-primary:active { transform: scale(0.97); }

    #formError { font-size: 0.78rem; color: #f44336; text-align: center; min-height: 1.1em; }

    /* ══ VIEW: FIGURINHA ════════════════════════════════════ */
    #viewSticker {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #0a0a12;
      z-index: 100;
    }
    #viewSticker.active { display: flex; }

    .sticker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      flex-shrink: 0;
      height: 50px;
    }
    .btn-ghost {
      background: none;
      border: none;
      color: #666;
      font-size: 0.83rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.07); color: #aaa; }

    .canvas-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      position: relative;
    }

    #output {
      max-height: 100%;
      max-width: 100%;
      aspect-ratio: 480 / 672;
      border-radius: 13px;
      display: block;
      filter:
        drop-shadow(0 0 22px rgba(0,156,59,0.4))
        drop-shadow(0 10px 28px rgba(0,0,0,0.75));
    }

    #statusOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #666;
      font-size: 0.82rem;
      pointer-events: none;
    }
    #statusOverlay.hidden { display: none; }
    #statusOverlay.err    { color: #f44336; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #222;
      border-top-color: var(--country);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #fpsBadge {
      position: absolute;
      top: 6px; right: 10px;
      font-size: 0.65rem;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* Rodapé */
    .sticker-footer {
      height: 110px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 0 24px;
    }

    /* Estado: câmera ao vivo */
    #ctrlLive {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
    }

    /* Botão shutter — estilo câmera nativa */
    #btnShutter {
      width: 70px; height: 70px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.22),
        0 0 0 9px rgba(255,255,255,0.08);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #btnShutter::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.1);
    }
    #btnShutter:active {
      transform: scale(0.88);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.22), 0 0 0 6px rgba(255,255,255,0.08);
    }

    #btnFlip {
      position: absolute;
      right: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #btnFlip:hover     { background: rgba(255,255,255,0.15); }
    #btnFlip:disabled  { opacity: 0.25; cursor: not-allowed; }

    /* Estado: imagem congelada */
    #ctrlFrozen {
      display: none;
      align-items: center;
      gap: 14px;
      width: 100%;
      justify-content: center;
    }

    .btn-retry {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.14);
      color: #aaa;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-retry:hover  { background: rgba(255,255,255,0.13); }
    .btn-retry:active { transform: scale(0.97); }

    .btn-share {
      background: var(--pink);
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 13px 28px;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 18px rgba(255,36,92,0.38);
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-share:hover  { filter: brightness(1.12); }
    .btn-share:active { transform: scale(0.96); }

    /* Debug overlay */
    #debugLog {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 45vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.93);
      color: #ccc;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 8px 10px 10px;
      z-index: 9999;
      display: none;
      border-top: 2px solid #f44336;
    }
    #debugLog .dbg-err  { color: #ff5252; font-weight: 700; }
    #debugLog .dbg-warn { color: #FFD700; }
    #debugLog .dbg-info { color: #69b4ff; }
    #debugClose {
      position: sticky; top: 0; float: right;
      background: #f44336; color: #fff;
      border: none; border-radius: 4px;
      padding: 2px 8px; font-size: 11px; cursor: pointer;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<!-- ══ VIEW: FORMULÁRIO ══════════════════════════════════════ -->
<div id="viewForm">
  <div class="form-logo">
    <h1>Figurinha <em>Copa 2026™</em> <span class="ver" id="appVersion">v0.9.6</span></h1>
    <p class="sub">Crie sua figurinha personalizada</p>
  </div>

  <div class="form-card">
    <div class="field">
      <label>Nome</label>
      <input type="text" id="playerName" maxlength="20" placeholder="Seu nome completo" autocomplete="name" inputmode="text">
      <span class="char-count" id="nameCount">0 / 20</span>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Departamento</label>
        <input type="text" id="playerDepto" maxlength="28" placeholder="Ex: Tecnologia">
      </div>
      <div class="field narrow">
        <label>Nº Camisa</label>
        <input type="number" id="playerNumber" min="1" max="99" placeholder="10" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label>Cargo</label>
      <input type="text" id="playerCargo" maxlength="28" placeholder="Ex: Desenvolvedor">
    </div>

    <div class="form-divider"></div>

    <button class="btn-primary" id="btnGenerate">Gerar figurinha ▶</button>
    <p id="formError"></p>
  </div>
</div>

<!-- ══ VIEW: FIGURINHA ═══════════════════════════════════════ -->
<div id="viewSticker">
  <header class="sticker-header">
    <button class="btn-ghost" id="btnBack">← Voltar</button>
    <span style="font-size:0.6rem;color:#2a2a3a">v0.9.6</span>
    <span style="width:68px"></span>
  </header>

  <div class="canvas-area">
    <canvas id="output" width="480" height="672"></canvas>
    <div id="statusOverlay">
      <div class="spinner" id="statusSpinner"></div>
      <span id="statusText">Carregando modelo…</span>
    </div>
    <div id="fpsBadge">-- fps</div>
  </div>

  <footer class="sticker-footer">
    <div id="ctrlLive">
      <button id="btnShutter" aria-label="Tirar foto"></button>
      <button id="btnFlip" title="Trocar câmera" disabled>⇄</button>
    </div>
    <div id="ctrlFrozen">
      <button class="btn-retry" id="btnRetry">Tentar novamente</button>
      <button class="btn-share" id="btnShare">⬆ Compartilhar</button>
    </div>
  </footer>
</div>

<!-- Debug overlay -->
<div id="debugLog">
  <button id="debugClose">✕ fechar</button>
  <div id="debugLines"></div>
</div>

<video id="video" autoplay muted playsinline style="display:none"></video>

<script type="module">
import {
  ImageSegmenter,
  FilesetResolver,
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs';

// ── Debug ────────────────────────────────────────────────────
const DEBUG      = new URLSearchParams(location.search).has('debug');
const debugLog   = document.getElementById('debugLog');
const debugLines = document.getElementById('debugLines');
document.getElementById('debugClose').onclick = () => { debugLog.style.display = 'none'; };

let _dbgFrameCount = 0;
function dbg(msg, level = 'info') {
  console[level === 'err' ? 'error' : level === 'warn' ? 'warn' : 'log']('[dbg]', msg);
  if (!DEBUG) return;
  debugLog.style.display = 'block';
  const line = document.createElement('div');
  line.className = `dbg-${level}`;
  const ts = new Date().toTimeString().slice(0, 8);
  line.textContent = `[${ts}] ${msg}`;
  debugLines.appendChild(line);
  while (debugLines.children.length > 60) debugLines.firstChild.remove();
  debugLog.scrollTop = debugLog.scrollHeight;
}

// ── Layout constants ─────────────────────────────────────────
const CW = 480, CH = 672;
const S  = CW / 400; // 1.2

// Parâmetros de segmentação (fixos)
const THR     = 0.42;
const FEATHER = 0.15;
const TEMP_W  = 0.60;

// ── DOM ──────────────────────────────────────────────────────
const video         = document.getElementById('video');
const canvas        = document.getElementById('output');
const ctx           = canvas.getContext('2d');
const fpsBadge      = document.getElementById('fpsBadge');
const nameInput     = document.getElementById('playerName');
const numInput      = document.getElementById('playerNumber');
const cargoInput    = document.getElementById('playerCargo');
const deptoInput    = document.getElementById('playerDepto');

const viewForm      = document.getElementById('viewForm');
const viewSticker   = document.getElementById('viewSticker');
const statusOverlay = document.getElementById('statusOverlay');
const statusSpinner = document.getElementById('statusSpinner');
const statusText    = document.getElementById('statusText');
const nameCount     = document.getElementById('nameCount');
const formError     = document.getElementById('formError');

const btnGenerate   = document.getElementById('btnGenerate');
const btnBack       = document.getElementById('btnBack');
const btnShutter    = document.getElementById('btnShutter');
const btnFlip       = document.getElementById('btnFlip');
const btnRetry      = document.getElementById('btnRetry');
const btnShare      = document.getElementById('btnShare');
const ctrlLive      = document.getElementById('ctrlLive');
const ctrlFrozen    = document.getElementById('ctrlFrozen');

// ── State ────────────────────────────────────────────────────
let segmenter = null, stream = null, running = false;
let lastTs = 0, fpsArr = [];
let cameras = [], camIdx = 0;
let workMask = null, prevMask = null;
let stickerActive = false, statusHidden = false;

// ── Offscreen canvases ───────────────────────────────────────
const vCanvas = document.createElement('canvas');
const vCtx    = vCanvas.getContext('2d', { willReadFrequently: true });

// Pessoa full-bleed (480 × 672)
const pCanvas = document.createElement('canvas');
pCanvas.width  = CW;
pCanvas.height = CH;
const pCtx = pCanvas.getContext('2d');

const mCanvas = document.createElement('canvas');
const mCtx    = mCanvas.getContext('2d');

// ── Status helpers ───────────────────────────────────────────
function setStatus(msg, isErr = false) {
  if (statusText)    statusText.textContent = msg;
  if (statusSpinner) statusSpinner.style.display = isErr ? 'none' : '';
  if (statusOverlay) {
    statusOverlay.className = isErr ? 'err' : '';
    statusOverlay.style.display = 'flex';
  }
}

function hideStatus() {
  if (!statusHidden) {
    statusHidden = true;
    if (statusOverlay) statusOverlay.style.display = 'none';
  }
}

// ── View switching ───────────────────────────────────────────
function showSticker() {
  stickerActive = true;
  statusHidden  = false;
  viewForm.style.display = 'none';
  viewSticker.classList.add('active');
  setLiveUI();
  if (statusOverlay) { statusOverlay.className = ''; statusOverlay.style.display = 'flex'; }
  if (segmenter) {
    initCamera().catch(e => setStatus('Erro câmera: ' + e.message, true));
  }
  // Se model ainda carregando, loadModel() chama initCamera() quando pronto
}

function showForm() {
  running       = false;
  stickerActive = false;
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
  viewSticker.classList.remove('active');
  viewForm.style.display = '';
  setLiveUI();
}

function setLiveUI() {
  ctrlLive.style.display   = 'flex';
  ctrlFrozen.style.display = 'none';
}

function setFrozenUI() {
  ctrlLive.style.display   = 'none';
  ctrlFrozen.style.display = 'flex';
}

// ── Share ────────────────────────────────────────────────────
async function shareSticker() {
  try {
    const blob = await new Promise((res, rej) =>
      canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob falhou')), 'image/png')
    );
    const slug = (nameInput.value || 'jogador').replace(/\s+/g, '-').toLowerCase();
    const file = new File([blob], `figurinha-copa2026-${slug}.png`, { type: 'image/png' });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      await navigator.share({
        title: 'Minha Figurinha Copa 2026',
        text:  `⚽ ${nameInput.value || 'Colaborador'} — Copa do Mundo 2026!`,
        files: [file],
      });
    } else if (navigator.share) {
      await navigator.share({
        title: 'Minha Figurinha Copa 2026',
        text:  `⚽ ${nameInput.value || 'Colaborador'} — Copa do Mundo 2026!`,
      });
    } else {
      const a = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = file.name;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    }
  } catch (e) {
    if (e.name !== 'AbortError') dbg('share erro: ' + e.message, 'err');
  }
}

// ── Validação ────────────────────────────────────────────────
function validateForm() {
  [nameInput, deptoInput, cargoInput, numInput].forEach(el => el.classList.remove('err'));
  formError.textContent = '';

  if (!nameInput.value.trim()) {
    nameInput.classList.add('err');
    formError.textContent = 'Nome é obrigatório.';
    nameInput.focus();
    return false;
  }
  if (!deptoInput.value.trim()) {
    deptoInput.classList.add('err');
    formError.textContent = 'Departamento é obrigatório.';
    deptoInput.focus();
    return false;
  }
  if (!cargoInput.value.trim()) {
    cargoInput.classList.add('err');
    formError.textContent = 'Cargo é obrigatório.';
    cargoInput.focus();
    return false;
  }
  const num = parseInt(numInput.value);
  if (!numInput.value || isNaN(num) || num < 1 || num > 99) {
    numInput.classList.add('err');
    formError.textContent = 'Número da camisa deve ser entre 1 e 99.';
    numInput.focus();
    return false;
  }
  return true;
}

// ── Model ────────────────────────────────────────────────────
async function loadModel() {
  setStatus('Inicializando runtime…');
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
    );
    setStatus('Baixando modelo…');
    const modelOpts = {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
      },
      runningMode: 'IMAGE',
      outputCategoryMask: true,
      outputConfidenceMasks: true,
    };
    // CPU delegate: GPU no Android Chrome produz inferência zero (bug WebGL silencioso)
    segmenter = await ImageSegmenter.createFromOptions(vision,
      { ...modelOpts, baseOptions: { ...modelOpts.baseOptions, delegate: 'CPU' } });
    dbg('Modelo carregado — delegate: CPU', 'info');
    if (stickerActive) {
      await initCamera();
    } else {
      hideStatus();
    }
  } catch (e) {
    dbg('loadModel erro: ' + e.message, 'err');
    setStatus('Erro ao carregar modelo: ' + e.message, true);
  }
}

// ── Camera ───────────────────────────────────────────────────
async function enumerateCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  cameras = devices.filter(d => d.kind === 'videoinput');
}

async function startCamera(deviceId) {
  stream?.getTracks().forEach(t => t.stop());
  const constraint = deviceId
    ? { deviceId: { exact: deviceId } }
    : { facingMode: 'user' };
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, ...constraint },
    audio: false,
  });
  video.srcObject = stream;
  if (video.readyState < 1)
    await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  await video.play();
  vCanvas.width  = video.videoWidth;
  vCanvas.height = video.videoHeight;
  await enumerateCameras();
  btnFlip.disabled = cameras.length < 2;
}

async function initCamera() {
  setStatus('Acessando câmera…');
  await startCamera(null);
  running       = true;
  statusHidden  = false;
  lastTs        = 0; fpsArr = []; prevMask = null; workMask = null;
  _dbgFrameCount = 0;
  requestAnimationFrame(loop);
}

async function flipCamera() {
  if (cameras.length < 2) return;
  camIdx = (camIdx + 1) % cameras.length;
  btnFlip.disabled = true;
  const wasRunning = running;
  running = false;
  await startCamera(cameras[camIdx].deviceId);
  running = wasRunning;
  if (running) {
    lastTs = 0; fpsArr = []; prevMask = null; workMask = null;
    requestAnimationFrame(loop);
  }
  btnFlip.disabled = cameras.length < 2;
}

// ── Render loop ──────────────────────────────────────────────
function loop(ts) {
  if (!running) return;
  if (video.readyState < 2) { requestAnimationFrame(loop); return; }

  const vW = video.videoWidth;
  const vH = video.videoHeight;

  // Cover crop — portrait e landscape, full card
  const srcScale = Math.min(vW / CW, vH / CH);
  const srcW     = CW * srcScale;
  const srcH     = CH * srcScale;
  const cropX    = (vW - srcW) / 2;
  const cropY    = (vH - srcH) / 2;

  vCtx.drawImage(video, 0, 0);

  try {
    const result = segmenter.segment(video);

    _dbgFrameCount++;
    if (_dbgFrameCount === 1) {
      try {
        const cx = Math.floor(vW / 2), cy = Math.floor(vH / 2);
        const px = vCtx.getImageData(cx, cy, 1, 1).data;
        dbg(`vCanvas pixel central: rgb(${px[0]},${px[1]},${px[2]}) a=${px[3]}`, px[3] === 0 ? 'warn' : 'info');
      } catch(e) { dbg('getImageData erro: ' + e.message, 'err'); }
      dbg(`1º frame — vídeo ${vW}×${vH}`, 'info');
      const hasCat  = result.categoryMask != null;
      const hasConf = result.confidenceMasks?.length > 0;
      dbg(`result hasCat=${hasCat} hasConf=${hasConf}`, 'info');
    }

    const masks = result.confidenceMasks;
    if (!masks?.length) {
      if (_dbgFrameCount <= 5 || _dbgFrameCount % 60 === 0)
        dbg(`frame ${_dbgFrameCount}: confidenceMasks vazio`, 'warn');
      result.close();
      requestAnimationFrame(loop); return;
    }

    const mask     = masks[0];
    const maskW    = mask.width;
    const maskH    = mask.height;
    const maskSize = maskW * maskH;
    const rawMask  = mask.getAsFloat32Array();

    if (_dbgFrameCount <= 3) {
      let rMax = 0;
      for (let i = 0; i < rawMask.length; i++) if (rawMask[i] > rMax) rMax = rawMask[i];
      dbg(`rawMask ${maskW}×${maskH} rMax=${rMax.toFixed(3)}`, rMax < 0.05 ? 'warn' : 'info');
    }

    // Temporal smoothing
    if (!workMask || workMask.length !== maskSize) {
      workMask = new Float32Array(maskSize);
      prevMask = null;
    }
    if (prevMask && TEMP_W > 0) {
      for (let i = 0; i < maskSize; i++)
        workMask[i] = (1 - TEMP_W) * rawMask[i] + TEMP_W * prevMask[i];
    } else {
      workMask.set(rawMask);
    }
    if (!prevMask) prevMask = new Float32Array(maskSize);
    prevMask.set(workMask);

    // Converte máscara → ImageData alpha-only
    if (mCanvas.width !== maskW || mCanvas.height !== maskH) {
      mCanvas.width = maskW; mCanvas.height = maskH;
      dbg(`máscara: ${maskW}×${maskH}`, 'info');
    }
    const maskImgData = new ImageData(maskW, maskH);
    const md          = maskImgData.data;
    const featherInv  = FEATHER > 0 ? 1 / FEATHER : 255;
    let   personDetected = false;
    let   maskMax = 0;

    for (let i = 0; i < maskSize; i++) {
      const v = workMask[i];
      if (v > maskMax) maskMax = v;
      if (v > 0.05) personDetected = true;
      const a = v <= THR ? 0 : Math.min(255, Math.round((v - THR) * featherInv * 255));
      const p = i * 4;
      md[p] = md[p+1] = md[p+2] = 255;
      md[p+3] = a;
    }

    if (_dbgFrameCount <= 5 || _dbgFrameCount % 150 === 0) {
      const ctr    = workMask[Math.floor(maskH/2) * maskW + Math.floor(maskW/2)];
      let   maskMin = workMask[0];
      for (let i = 1; i < maskSize; i++) if (workMask[i] < maskMin) maskMin = workMask[i];
      dbg(`frame ${_dbgFrameCount}: ${maskW}×${maskH} min=${maskMin.toFixed(3)} max=${maskMax.toFixed(3)} ctr=${ctr.toFixed(3)} person=${personDetected}`,
        maskMax < 0.05 ? 'warn' : 'info');
    }

    mCtx.putImageData(maskImgData, 0, 0);

    // Compositing GPU — full-bleed
    pCtx.clearRect(0, 0, CW, CH);
    pCtx.save();
    pCtx.translate(CW, 0);
    pCtx.scale(-1, 1);
    pCtx.drawImage(vCanvas, cropX, cropY, srcW, srcH, 0, 0, CW, CH);
    pCtx.restore();

    if (personDetected) {
      // Máscara em coordenadas do vídeo — mesmo crop do frame
      pCtx.globalCompositeOperation = 'destination-in';
      pCtx.save();
      pCtx.translate(CW, 0);
      pCtx.scale(-1, 1);
      pCtx.drawImage(mCanvas, cropX, cropY, srcW, srcH, 0, 0, CW, CH);
      pCtx.restore();
      pCtx.globalCompositeOperation = 'source-over';
    }

    renderCard(pCanvas);
    hideStatus();

    if (lastTs > 0) {
      fpsArr.push(ts - lastTs);
      if (fpsArr.length > 20) fpsArr.shift();
      fpsBadge.textContent = `${(1000 / (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length)).toFixed(1)} fps`;
    }
    lastTs = ts;

    result.close();
  } catch (e) {
    dbg('segment() erro: ' + e.message, 'err');
    setStatus('Erro: ' + e.message, true);
  }

  requestAnimationFrame(loop);
}

// ── Helpers de desenho ───────────────────────────────────────
const CORNER_R = 14;

function rrPath(x, y, w, h) {
  const p = new Path2D();
  p.roundRect(x, y, w, h, CORNER_R);
  return p;
}

function drawStarPath(cx, cy, pts, ro, ri) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const a = (i * Math.PI / pts) - Math.PI / 2;
    const r = i % 2 === 0 ? ro : ri;
    i === 0
      ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r)
      : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawRing(cx, cy, r, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
}

function drawSoccerField() {
  const FL = 18, FT = 18;
  const FW = CW - 36, FH = CH - 36;
  const FR = FL + FW, FB = FT + FH;
  const FCX = CW / 2;
  const MID_Y = FT + FH / 2;

  ctx.save();
  ctx.strokeStyle = '#2E7D32';
  ctx.fillStyle   = '#2E7D32';
  ctx.lineWidth   = 1.5 * S;

  // Retângulo externo
  ctx.strokeRect(FL, FT, FW, FH);

  // Linha do meio
  ctx.beginPath();
  ctx.moveTo(FL, MID_Y);
  ctx.lineTo(FR, MID_Y);
  ctx.stroke();

  // Círculo central
  const CR = Math.round(9.15 / 68 * FW);
  ctx.beginPath();
  ctx.arc(FCX, MID_Y, CR, 0, Math.PI * 2);
  ctx.stroke();

  // Ponto central
  ctx.beginPath();
  ctx.arc(FCX, MID_Y, 3, 0, Math.PI * 2);
  ctx.fill();

  // Grandes áreas
  const PA_W = Math.round(40.32 / 68 * FW);
  const PA_H = Math.round(16.5  / 105 * FH);
  const PA_L = FL + (FW - PA_W) / 2;
  ctx.strokeRect(PA_L, FT,        PA_W, PA_H);
  ctx.strokeRect(PA_L, FB - PA_H, PA_W, PA_H);

  // Pequenas áreas
  const GA_W = Math.round(18.32 / 68 * FW);
  const GA_H = Math.round(5.5   / 105 * FH);
  const GA_L = FL + (FW - GA_W) / 2;
  ctx.strokeRect(GA_L, FT,        GA_W, GA_H);
  ctx.strokeRect(GA_L, FB - GA_H, GA_W, GA_H);

  // Pontos de pênalti
  const PS_H = Math.round(11 / 105 * FH);
  ctx.beginPath(); ctx.arc(FCX, FT + PS_H, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(FCX, FB - PS_H, 3, 0, Math.PI * 2); ctx.fill();

  // Meias-luas (D) — círculo completo clipado fora das grandes áreas
  const DA_R = Math.round(9.15 / 68 * FW);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, FT + PA_H, CW, FH - 2 * PA_H);
  ctx.clip();
  ctx.beginPath(); ctx.arc(FCX, FT + PS_H, DA_R, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(FCX, FB - PS_H, DA_R, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  // Arcos dos cantos
  const CA_R = Math.max(7, Math.round(1 / 68 * FW));
  ctx.beginPath(); ctx.arc(FL, FT, CA_R, 0,           Math.PI / 2,     false); ctx.stroke();
  ctx.beginPath(); ctx.arc(FR, FT, CA_R, Math.PI / 2, Math.PI,         false); ctx.stroke();
  ctx.beginPath(); ctx.arc(FL, FB, CA_R, -Math.PI / 2, 0,              false); ctx.stroke();
  ctx.beginPath(); ctx.arc(FR, FB, CA_R, Math.PI,      3*Math.PI / 2,  false); ctx.stroke();

  ctx.restore();
}

function drawCornerBracket(x, y, dir) {
  const sz = Math.round(22 * S);
  ctx.strokeStyle = 'rgba(255,223,0,0.55)';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  if (dir === 'tl') {
    ctx.moveTo(x + sz, y); ctx.lineTo(x, y); ctx.lineTo(x, y + sz);
  } else {
    ctx.moveTo(x - sz, y); ctx.lineTo(x, y); ctx.lineTo(x, y + sz);
  }
  ctx.stroke();
}

// ── Renderização do card ─────────────────────────────────────
function renderCard(personSrc) {
  const name   = (nameInput.value  || 'NOME DO COLABORADOR').toUpperCase();
  const numero = String(numInput.value  || '10').trim();
  const cargo  = (cargoInput.value || 'Cargo').trim();
  const depto  = (deptoInput.value || 'Departamento').trim();

  ctx.clearRect(0, 0, CW, CH);
  ctx.save();
  ctx.clip(rrPath(0, 0, CW, CH));

  const hPad  = Math.round(18 * S);
  const inPad = Math.round(18 * S);
  const TOP_H = 80;          // header overlay h
  const BOT_H = 188;         // info panel h
  const BSH_N = 40;          // brand strip h (dentro do BOT_H)
  const BOT_Y = CH - BOT_H;  // 484
  const BSY_N = CH - BSH_N;  // 632
  const PZ_Y  = TOP_H + 4;   // foto visível começa aqui
  const PZ_H  = BOT_Y - PZ_Y - 4; // zona visível sem overlay (~392px)

  // ── 1. Background (verde claro) ──────────────────
  ctx.fillStyle = '#C8E6C9';
  ctx.fillRect(0, 0, CW, CH);

  // ── 2. Campo de futebol ──────────────────────────
  drawSoccerField();

  // ── 3. Pessoa full-bleed ─────────────────────────
  if (personSrc) {
    ctx.drawImage(personSrc, 0, 0);
  } else {
    ctx.fillStyle = 'rgba(0,100,30,0.35)';
    ctx.beginPath();
    ctx.arc(CW/2, Math.round(220*S), Math.round(46*S), 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(CW/2 - Math.round(14*S), Math.round(264*S), Math.round(28*S), Math.round(28*S));
    ctx.beginPath();
    ctx.arc(CW/2, Math.round(400*S), Math.round(128*S), Math.PI, 0);
    ctx.fill();
  }

  // ── 4. Vinheta lateral (foto zone) ───────────────
  const vigW = Math.round(52*S);
  const vigL = ctx.createLinearGradient(0, 0, vigW, 0);
  vigL.addColorStop(0, 'rgba(0,15,5,0.58)');
  vigL.addColorStop(1, 'rgba(0,15,5,0)');
  ctx.fillStyle = vigL;
  ctx.fillRect(0, PZ_Y, vigW, PZ_H);

  const vigR = ctx.createLinearGradient(CW - vigW, 0, CW, 0);
  vigR.addColorStop(0, 'rgba(0,15,5,0)');
  vigR.addColorStop(1, 'rgba(0,15,5,0.58)');
  ctx.fillStyle = vigR;
  ctx.fillRect(CW - vigW, PZ_Y, vigW, PZ_H);

  // ── 5. Fade inferior foto → painel ───────────────
  const botFade = ctx.createLinearGradient(0, BOT_Y - 36, 0, BOT_Y);
  botFade.addColorStop(0, 'rgba(0,20,8,0)');
  botFade.addColorStop(1, 'rgba(0,20,8,0.96)');
  ctx.fillStyle = botFade;
  ctx.fillRect(0, BOT_Y - 36, CW, 36);

  // ── 6. Scrim superior ────────────────────────────
  const topScrim = ctx.createLinearGradient(0, 0, 0, TOP_H + 32);
  topScrim.addColorStop(0,    'rgba(0,15,5,0.96)');
  topScrim.addColorStop(0.65, 'rgba(0,15,5,0.84)');
  topScrim.addColorStop(1,    'rgba(0,15,5,0)');
  ctx.fillStyle = topScrim;
  ctx.fillRect(0, 0, CW, TOP_H + 32);

  // ── 7. Hairlines douradas ─────────────────────────
  ctx.fillStyle = '#FFDF00';
  ctx.fillRect(0, TOP_H, CW, 3);
  ctx.fillStyle = 'rgba(255,223,0,0.7)';
  ctx.fillRect(0, BOT_Y - 3, CW, 3);

  // ── 8. Conteúdo do header ────────────────────────
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle    = 'rgba(255,255,255,0.55)';
  ctx.font         = `600 ${Math.round(7.5*S)}px Poppins, Arial`;
  ctx.fillText('FIFA World Cup™', hPad, Math.round(10*S));

  ctx.fillStyle = '#FFDF00';
  ctx.font      = `900 ${Math.round(26*S)}px Poppins, "Arial Black", Arial`;
  ctx.fillText('BRASIL', hPad, Math.round(22*S));

  ctx.font = `${Math.round(8*S)}px Arial`;
  for (let i = 0; i < 5; i++)
    ctx.fillText('★', hPad + i * Math.round(10*S), Math.round(51*S));

  const badgeCX = CW / 2, badgeCY = TOP_H / 2;
  const badgeR  = Math.round(19 * S);
  ctx.fillStyle   = 'rgba(0,60,20,0.85)';
  ctx.beginPath();
  ctx.arc(badgeCX, badgeCY, badgeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#FFDF00';
  ctx.lineWidth   = Math.round(2 * S);
  ctx.stroke();
  ctx.lineWidth   = Math.round(0.9 * S);
  drawStarPath(badgeCX, badgeCY, 5, Math.round(11*S), Math.round(5*S));
  ctx.stroke();

  ctx.textAlign    = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle    = 'rgba(255,255,255,0.55)';
  ctx.font         = `600 ${Math.round(7.5*S)}px Poppins, Arial`;
  ctx.fillText('Copa do Mundo', CW - hPad, Math.round(10*S));
  ctx.fillStyle = '#FFDF00';
  ctx.font      = `900 ${Math.round(30*S)}px Poppins, "Arial Black", Arial`;
  ctx.fillText('2026', CW - hPad, Math.round(18*S));

  drawCornerBracket(Math.round(10*S),      PZ_Y + Math.round(8*S), 'tl');
  drawCornerBracket(CW - Math.round(10*S), PZ_Y + Math.round(8*S), 'tr');

  // ── 9. Painel info ───────────────────────────────
  const panelPath = new Path2D();
  panelPath.roundRect(0, BOT_Y, CW, BOT_H, [14, 14, 0, 0]);
  ctx.fillStyle = 'rgba(0,20,8,0.96)';
  ctx.fill(panelPath);

  // ── 10. Ghost elements no painel ─────────────────
  ctx.save();
  ctx.globalAlpha  = 0.12;
  ctx.fillStyle    = '#FFDF00';
  ctx.font         = `900 ${Math.round(68*S)}px Poppins, "Arial Black", Arial`;
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('BRASIL', CW + Math.round(8*S), BOT_Y - Math.round(8*S));
  ctx.restore();

  ctx.save();
  ctx.globalAlpha  = 0.10;
  ctx.fillStyle    = '#FFDF00';
  ctx.font         = `900 ${Math.round(96*S)}px Poppins, "Arial Black", Arial`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText(numero, Math.round(14*S), BSY_N - Math.round(10*S));
  ctx.restore();

  // ── 11. Nome ─────────────────────────────────────
  const words    = name.split(' ');
  const mid      = Math.ceil(words.length / 2);
  const line1    = words.slice(0, mid).join(' ');
  const line2    = words.slice(mid).join(' ');
  const lhPx     = Math.round(26 * S * 1.05);
  const nameY    = BOT_Y + Math.round(12 * S);

  ctx.fillStyle    = '#FFDF00';
  ctx.font         = `900 ${Math.round(26*S)}px Poppins, "Arial Black", Arial`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.shadowColor  = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur   = Math.round(6 * S);
  ctx.fillText(line1, inPad, nameY);
  if (line2) ctx.fillText(line2, inPad, nameY + lhPx);
  ctx.shadowBlur = 0;

  const linesUsed = line2 ? 2 : 1;
  const tickY     = nameY + linesUsed * lhPx + Math.round(6 * S);
  ctx.fillStyle   = 'rgba(255,223,0,0.5)';
  ctx.fillRect(inPad, tickY, Math.round(32 * S), Math.round(3 * S));

  const roleLineH = Math.round(12 * S * 1.55);
  const roleY     = tickY + Math.round(3 * S) + Math.round(5 * S);
  ctx.fillStyle    = 'rgba(255,255,255,0.85)';
  ctx.font         = `${Math.round(12*S)}px Poppins, Arial`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`${cargo} · ${depto}`, inPad, roleY);
  ctx.fillText('Hands On Tecnologia · São Paulo', inPad, roleY + roleLineH);

  // ── 12. Brand strip ───────────────────────────────
  ctx.fillStyle = '#005C1F';
  ctx.fillRect(0, BSY_N, CW, BSH_N);
  ctx.fillStyle = 'rgba(255,223,0,0.2)';
  ctx.fillRect(0, BSY_N, CW, 1);

  ctx.fillStyle    = 'rgba(255,255,255,0.45)';
  ctx.font         = `700 ${Math.round(11*S)}px Poppins, Arial`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('HANDS ON', Math.round(16*S), BSY_N + BSH_N/2);

  ctx.fillStyle = '#FF245C';
  ctx.font      = `700 ${Math.round(12*S)}px "JetBrains Mono", "Courier New", monospace`;
  ctx.fillText('>>>', Math.round(16*S) + Math.round(74*S), BSY_N + BSH_N/2);

  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font      = `600 ${Math.round(7*S)}px Poppins, Arial`;
  ctx.fillText('ORDEM E PROGRESSO', CW - Math.round(16*S), BSY_N + BSH_N/2 - Math.round(5*S));
  ctx.fillStyle = 'rgba(255,223,0,0.3)';
  ctx.fillText('USA · MEX · CAN · 2026', CW - Math.round(16*S), BSY_N + BSH_N/2 + Math.round(5*S));

  ctx.restore(); // desfaz clip do card

  // Borda interna
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.42)';
  ctx.lineWidth   = 2.5;
  ctx.stroke(rrPath(2.5, 2.5, CW - 5, CH - 5));
  ctx.restore();
}

// ── Cache localStorage (TTL 1 dia) ───────────────────────────
const CACHE_KEY = 'figurinha_copa2026';
const CACHE_TTL = 86_400_000;

function saveCache() {
  const data = {
    ts:     Date.now(),
    name:   nameInput.value,
    number: numInput.value,
    cargo:  cargoInput.value,
    depto:  deptoInput.value,
  };
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Date.now() - data.ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return; }
    if (data.name   !== undefined) nameInput.value  = data.name;
    if (data.number !== undefined) numInput.value   = data.number;
    if (data.cargo  !== undefined) cargoInput.value = data.cargo;
    if (data.depto  !== undefined) deptoInput.value = data.depto;
  } catch {}
}

// ── Eventos ──────────────────────────────────────────────────
// Contador de caracteres do nome
nameInput.addEventListener('input', () => {
  nameCount.textContent = `${nameInput.value.length} / 20`;
  nameInput.classList.remove('err');
  formError.textContent = '';
});
[deptoInput, cargoInput, numInput].forEach(el =>
  el.addEventListener('input', () => { el.classList.remove('err'); formError.textContent = ''; })
);

// Form → Sticker
btnGenerate.addEventListener('click', () => {
  if (!validateForm()) return;
  saveCache();
  showSticker();
});

// Sticker → Form
btnBack.addEventListener('click', showForm);

// Shutter: congela imagem
btnShutter.addEventListener('click', () => {
  running = false;
  setFrozenUI();
});

// Retry: retoma câmera
btnRetry.addEventListener('click', () => {
  running = true;
  lastTs  = 0; fpsArr = [];
  setLiveUI();
  requestAnimationFrame(loop);
});

// Compartilhar
btnShare.addEventListener('click', shareSticker);

// Trocar câmera
btnFlip.addEventListener('click', async () => {
  try { await flipCamera(); }
  catch (e) { setStatus('Erro ao trocar câmera: ' + e.message, true); }
});

// ── Init ─────────────────────────────────────────────────────
loadCache();
nameCount.textContent = `${nameInput.value.length} / 20`;
document.fonts.ready.then(() => renderCard(null));

// Carrega modelo em background — câmera só inicia após form submit
loadModel();
</script>
